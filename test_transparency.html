<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #33ff33; padding: 50px; }
        .pin-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .pin-box { background-color: white; border: 1px solid black; padding: 10px; }
        .pin-box.trans { background-color: transparent; }
        img { width: 100px; height: 100px; border: 1px solid red; }
    </style>
</head>
<body>
    <h1>Pin Transparency Test</h1>
    <div class="pin-container">
        <div class="pin-box">
            <p>On White</p>
            <img src="public/icons/pins/1 Shri_Krishna_Pin/1.1.svg">
        </div>
        <div class="pin-box trans">
            <p>On Transparent (Green body)</p>
            <img src="public/icons/pins/1 Shri_Krishna_Pin/1.1.svg">
        </div>
        <div class="pin-box trans">
            <p>Series 4.1</p>
            <img src="public/icons/pins/4 Shri_Govind_Prabhu_Pin/4.1.svg">
        </div>
    </div>
</body>
</html>
