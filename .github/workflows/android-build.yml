name: Android Build

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.3

jobs:
  build:
    name: Native APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Vite Project
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }} # e.g. v1.0.3

      - name: 📲 Initialize Capacitor Android (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: 🚀 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔨 Build Android APK with EAS
        run: npx eas build --platform android --profile preview --non-interactive
